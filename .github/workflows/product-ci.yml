name: Product CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Product Rust gate
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned formatting toolchain
        run: rustup toolchain install nightly-2025-07-18 --profile minimal --component rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Verify release manifest
        run: python3 scripts/verify-release-manifest.py
      - name: Verify test and performance manifests
        run: |
          tests/test-test-manifest.sh
          tests/test-performance-summary.sh
      - name: Check formatting
        run: cargo +nightly-2025-07-18 fmt --all -- --check
      - name: Check product lints
        run: cargo clippy -p ark-lsp --all-targets -- -D warnings
      - name: Test detached LSP product crates
        run: |
          cargo test -p ark-lsp-core --lib
          cargo test -p ark-lsp

  fast-product:
    name: Required Lua and product confidence
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/action-setup-vim@v1
        with:
          version: v0.11.3
          neovim: true
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2'
          use-public-rspm: true
      - name: Install product test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'
      - name: Run deterministic required tier
        run: scripts/run-full-suite.sh --skip-rust --skip-clippy --tier required

  arkbridge:
    name: arkbridge package gate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2'
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/arkbridge
          extra-packages: any::rcmdcheck
          needs: check
      - name: Check arkbridge with zero warnings and notes
        run: scripts/check-arkbridge.sh

  release-artifact:
    name: Build release artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build and verify release asset
        run: scripts/package-release.sh dist/release
      - name: Verify installer failure and rollback contracts
        run: tests/test-release-installer.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ark-lsp-release
          path: dist/release/
          if-no-files-found: error
          retention-days: 14

  product-smoke:
    name: Clean installed-product smoke
    needs: release-artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          name: ark-lsp-release
          path: dist/release
      - uses: rhysd/action-setup-vim@v1
        with:
          version: v0.11.3
          neovim: true
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2'
          use-public-rspm: true
      - name: Install smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'
      - name: Load release identity
        run: |
          python3 <<'PY' >>"${GITHUB_ENV}"
          import json
          manifest = json.load(open("release-manifest.json"))
          target = manifest["release_targets"][0]
          print(f"PRODUCT_VERSION={manifest['product_version']}")
          print(f"RUST_TARGET={target['rust_target']}")
          print(f"RELEASE_ASSET={target['asset']}")
          PY
      - name: Install the downloaded release without Cargo
        run: |
          asset="dist/release/${RELEASE_ASSET}"
          checksum="${asset}.sha256"
          chmod 755 "${asset}"
          scripts/install-release.sh install \
            --version "${PRODUCT_VERSION}" \
            --target "${RUST_TARGET}" \
            --asset-url "file://${GITHUB_WORKSPACE}/${asset}" \
            --checksum-url "file://${GITHUB_WORKSPACE}/${checksum}" \
            --install-root "${RUNNER_TEMP}/ark"
      - name: Verify packaged discovery and static LSP startup
        env:
          ARK_NVIM_DEV_MODE: '0'
          ARK_NVIM_INSTALL_ROOT: ${{ runner.temp }}/ark
        run: |
          test ! -d target
          scripts/run-e2e-test.sh --init NONE tests/e2e/release_manifest_and_discovery.lua
          scripts/run-e2e-test.sh --init NONE tests/e2e/detached_parity.lua
      - name: Verify canonical live bridge attach
        env:
          ARK_NVIM_DEV_MODE: '0'
          ARK_NVIM_INSTALL_ROOT: ${{ runner.temp }}/ark
        run: scripts/run-e2e-test.sh --init NONE tests/e2e/current_env_completion_timing.lua
      - name: Upload smoke diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-smoke-diagnostics
          path: /tmp/arktest-*/
          if-no-files-found: ignore
          retention-days: 14

  readme-clean-room:
    name: README clean-room smoke without Rust
    needs: release-artifact
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          name: ark-lsp-release
          path: dist/readme
      - name: Preserve executable release mode
        run: chmod 755 dist/readme/ark-lsp-*x86_64-unknown-linux-gnu
      - name: Build Rust-free README image
        run: docker build -f docker/readme-minimal/Dockerfile -t ark-readme-test:ci .
      - name: Run README tmux/live-session smoke
        run: docker run --rm ark-readme-test:ci smoke
