name: Deep Product CI

on:
  schedule:
    - cron: '17 15 * * 6'
  workflow_dispatch:
    inputs:
      tier:
        description: Deep tier to run
        required: true
        default: serial-integration
        type: choice
        options:
          - serial-integration
          - full-tui
          - soak
          - full

permissions:
  contents: read

jobs:
  deep-suite:
    name: Serial ${{ matrix.tier }} suite
    strategy:
      fail-fast: false
      matrix:
        tier: ${{ github.event_name == 'schedule' && fromJSON('["serial-integration","full-tui","soak"]') || fromJSON(format('["{0}"]', inputs.tier)) }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/action-setup-vim@v1
        with:
          version: v0.11.3
          neovim: true
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2'
          use-public-rspm: true
      - name: Install deep-suite dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          Rscript -e 'install.packages(c("jsonlite", "data.table", "targets", "tidyselect"), repos = "https://cloud.r-project.org")'
      - name: Prepare pinned full-config fixture
        if: matrix.tier == 'full-tui' || matrix.tier == 'full'
        run: scripts/prepare-e2e-fixture.py --download
      - name: Run selected tier serially
        run: scripts/run-full-suite.sh --tier "${{ matrix.tier }}" --e2e-timeout 180
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deep-${{ matrix.tier }}-diagnostics
          path: /tmp/arktest-*/
          if-no-files-found: ignore
          retention-days: 21

  performance:
    name: Repeated performance distributions
    if: github.event_name == 'schedule'
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: rhysd/action-setup-vim@v1
        with:
          version: v0.11.3
          neovim: true
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2'
          use-public-rspm: true
      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          Rscript -e 'install.packages("jsonlite", repos = "https://cloud.r-project.org")'
      - name: Collect and validate benchmark distributions
        run: scripts/run-performance-suite.sh artifacts/performance/ci
      - name: Retain structured samples and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: artifacts/performance/ci/
          if-no-files-found: error
          retention-days: 90
