name: "Check R"

# Workflow derived from https://github.com/posit-dev/setup-air/tree/main/examples

on:
  workflow_dispatch:
  schedule:
    - cron: '53 3 * * 1'

jobs:
  format-suggest:
    name: Check R formatting
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install
        uses: posit-dev/setup-air@v1

      - name: Format
        run: air format .

      - name: Check diff
        run: git diff --exit-code
